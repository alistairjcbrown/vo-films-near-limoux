on:
  schedule:
    - cron: '0 3 * * *' # every morning at 3am UTC
  workflow_dispatch:

name: Build and deploy website

# No default permissions; each job is granted only what it needs below.
permissions: {}

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    # Runs on a self-hosted runner so the scrape goes out over a residential IP
    # (GitHub-hosted datacenter IPs are flagged by Cloudflare). The runner needs
    # Firefox's system libraries and Xvfb pre-installed (see README); they are
    # deliberately NOT installed here so the nightly run doesn't mutate the host.
    runs-on: [self-hosted, vo-films-runner]
    # Read-only token: the build never needs write access, and this keeps any
    # Pages/deploy credentials off the self-hosted (home-network) runner.
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
      - run: npm ci
      # The persistent self-hosted runner keeps ~/.cache/camoufox on its own
      # disk between runs, so this is a near-instant no-op after the first run
      # (and self-heals if the browser is ever missing). We deliberately do NOT
      # use actions/cache here: on a self-hosted runner that would download and
      # re-upload the ~650MB browser to GitHub's cache over the host's own
      # connection every run, which is slower than just reusing the local copy.
      - name: Fetch Camoufox browser
        run: npx camoufox-js fetch
      - run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

  deploy:
    name: Deploy site
    # Stays on a GitHub-hosted runner so the Pages deploy credentials never
    # touch the self-hosted runner. Consumes the artifact uploaded by `build`.
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
