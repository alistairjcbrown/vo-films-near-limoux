on:
  schedule:
    - cron: '0 3 * * *' # every morning at 3am UTC
  workflow_dispatch:

name: Build and deploy website

# No default permissions; each job is granted only what it needs below.
permissions: {}

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    # Runs on a self-hosted runner so the scrape goes out over a residential IP
    # (GitHub-hosted datacenter IPs are flagged by Cloudflare). The runner needs
    # Firefox's system libraries and Xvfb pre-installed (see README); they are
    # deliberately NOT installed here so the nightly run doesn't mutate the host.
    runs-on: [self-hosted, vo-films-runner]
    # Read-only token: the build never needs write access, and this keeps any
    # Pages/deploy credentials off the self-hosted (home-network) runner.
    permissions:
      contents: read
    env:
      # The Camoufox browser is PINNED and provisioned manually on the runner
      # (see README). By default camoufox-js auto-installs the newest GitHub
      # release *including prereleases*, and a broken arm64 alpha has shipped
      # (extracts to fonts/config with no browser binary), silently breaking the
      # build. This flag stops camoufox-js touching the pinned browser at all,
      # and makes it skip the (optional) addon download gracefully at launch.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
      - run: npm ci
      # Fail loudly if the manually-pinned browser is incomplete, rather than
      # letting the scrape blow up mid-run. These three files are all a launch
      # needs (browser binary, version metadata, and the GeoIP db for geoip:true;
      # addons are skipped via the flag above). We deliberately do NOT run
      # `camoufox-js fetch` here - it would try to replace the pin with the
      # newest (possibly broken) release.
      - name: Verify pinned Camoufox is installed
        run: |
          test -f ~/.cache/camoufox/camoufox-bin
          test -f ~/.cache/camoufox/version.json
          test -f ~/.cache/camoufox/GeoLite2-City.mmdb
      - run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

  deploy:
    name: Deploy site
    # Stays on a GitHub-hosted runner so the Pages deploy credentials never
    # touch the self-hosted runner. Consumes the artifact uploaded by `build`.
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
