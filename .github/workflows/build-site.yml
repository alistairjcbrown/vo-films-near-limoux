on:
  schedule:
    - cron: '0 3 * * *' # every morning at 3am UTC
  workflow_dispatch:

name: Build and deploy website

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - run: npm ci
      # Camoufox is a Firefox build, so it needs Firefox's system libraries plus
      # Xvfb for the headless: "virtual" display used in CI.
      - name: Install browser system dependencies
        run: |
          npx playwright install-deps firefox
          sudo apt-get install -y xvfb
      # Cache the ~311MB Camoufox browser + GeoIP DB so it isn't re-downloaded
      # on every scheduled run. fetch is a no-op when the cache is restored.
      - name: Cache Camoufox browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/camoufox
          key: camoufox-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Fetch Camoufox browser
        run: npx camoufox-js fetch
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    name: Deploy site
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
